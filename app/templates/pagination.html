{% macro pagination(pg, endpoint) %}
{% if pg.pages > 1 %}
<div class="pagination-wrap">
    <span>Стр. {{ pg.page }}/{{ pg.pages }}</span>
    {% if pg.has_prev %}<a href="{{ url_for(endpoint, page=pg.prev_num) }}">&laquo;</a>{% endif %}
    {% if pg.has_next %}<a href="{{ url_for(endpoint, page=pg.next_num) }}">&raquo;</a>{% endif %}
</div>
{% endif %}
{% endmacro %}

{% macro search(endpoint) %}
<form method="GET" class="search-mini"><input name="search" placeholder="Поиск..."><button>►</button></form>
{% endmacro %}

<style>
.pagination-wrap{display:flex;gap:0.5rem;font-size:1rem;align-items:center}
.pagination-wrap a{text-decoration:none;padding:0.5rem 1rem;border:1px solid var(--border-color);border-radius:0.25rem}
.search-mini{display:flex;gap:0.5rem;margin-bottom:1rem}
.search-mini input{padding:0.5rem;font-size:1rem;width:150px;border:1px solid var(--border-color);border-radius:0.25rem;background:var(--surface-color)}
.search-mini button{padding:0.5rem 1rem;font-size:1rem}
</style>
