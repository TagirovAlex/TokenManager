{% macro pagination(pg, endpoint) %}
{% if pg.pages > 1 %}
<div class="pagination-wrap">
    <span>Стр. {{ pg.page }}/{{ pg.pages }}</span>
    {% if pg.has_prev %}<a href="{{ url_for(endpoint, page=pg.prev_num) }}">&laquo;</a>{% endif %}
    {% if pg.has_next %}<a href="{{ url_for(endpoint, page=pg.next_num) }}">&raquo;</a>{% endif %}
</div>
{% endif %}
{% endmacro %}

{% macro search(endpoint) %}
<form method="GET" class="search-mini"><input name="search" placeholder="Поиск..."><button>►</button></form>
{% endmacro %}

<style>
.pagination-wrap{display:flex;gap:0.5rem;font-size:0.75rem;align-items:center}
.pagination-wrap a{text-decoration:none;padding:0.125rem 0.25rem;border:1px solid var(--border-color);border-radius:0.125rem}
.search-mini{display:flex;gap:0.25rem;margin-bottom:0.5rem}
.search-mini input{padding:0.125rem 0.25rem;font-size:0.75rem;width:100px}
.search-mini button{padding:0.125rem 0.25rem;font-size:0.75rem}
</style>
