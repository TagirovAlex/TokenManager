{% extends "base.html" %}

{% block title %}Редактировать категорию - Prompt Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Редактировать категорию</h1>
    <a href="{{ url_for('web.categories') }}" class="btn btn-secondary">Назад</a>
</div>

<div class="grid grid-2">
<div class="card">
        <h3 class="card-title">Реквизиты категории</h3>
        <a href="{{ url_for('web.attribute_list', category_id=category.id) }}" class="btn btn-secondary">Управление реквизитами ({{ attributes|length }})</a>
    </div>
</div>

<script>
function previewEditCategoryImage(input) {
    const preview = document.getElementById('category-edit-preview');
    const img = document.getElementById('category-edit-img');
    
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            img.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
