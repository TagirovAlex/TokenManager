{% extends "base.html" %}

{% block title %}Редактировать объект - Prompt Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Редактировать объект</h1>
    <a href="{{ url_for('web.objects') }}" class="btn btn-secondary">Назад</a>
</div>

<div class="card" style="max-width: 600px;">
    <form method="POST" action="{{ url_for('web.object_update', object_id=object.id) }}" enctype="multipart/form-data">
        <div class="form-group">
            <label class="form-label">Категория</label>
            <select name="category_id" class="form-select" required>
                {% for cat in categories %}
                <option value="{{ cat.id }}" {% if cat.id == object.category_id %}selected{% endif %}>{{ cat.display_name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Имя</label>
            <input type="text" name="name" class="form-input" required value="{{ object.name }}">
        </div>
        <div class="form-group">
            <label class="form-label">Промт</label>
            <textarea name="prompt" class="form-textarea" required>{{ object.prompt }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Описание</label>
            <textarea name="description" class="form-textarea">{{ object.description or '' }}</textarea>
        </div>
        <div class="form-group">
            <label class="form-label">Изображение</label>
            {% if object.image_path %}
            <div style="margin-bottom: 10px;">
                <img src="{{ object.image_path }}" style="max-width: 200px; max-height: 200px; border-radius: 8px;">
            </div>
            {% endif %}
            <input type="file" name="image" class="form-input" accept="image/*" onchange="previewImage(this)">
            <div id="image-preview" style="margin-top: 10px; display: none;">
                <img id="preview-img" style="max-width: 200px; max-height: 200px; border-radius: 8px;">
            </div>
        </div>
        <div class="actions">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{{ url_for('web.object_delete', object_id=object.id) }}" class="btn btn-danger" data-confirm="Удалить объект?">Удалить</a>
        </div>
    </form>
</div>

<script>
function previewImage(input) {
    const preview = document.getElementById('image-preview');
    const img = document.getElementById('preview-img');
    
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            img.src = e.target.result;
            preview.style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{% endblock %}
