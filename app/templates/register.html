{% extends "base.html" %}

{% block title %}Регистрация - Prompt Manager{% endblock %}

{% block content %}
<div class="page-header">
    <h1 class="page-title">Регистрация</h1>
</div>

<div class="card" style="max-width: 400px; margin: 0 auto;">
    <form method="POST" action="{{ url_for('auth.register') }}">
        <div class="form-group">
            <label class="form-label">Имя пользователя</label>
            <input type="text" name="username" class="form-input" required minlength="3">
        </div>
        <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-input" required>
        </div>
        <div class="form-group">
            <label class="form-label">Пароль (минимум 8 символов)</label>
            <input type="password" name="password" class="form-input" required minlength="8">
        </div>
        <div class="form-group">
            <label class="form-label">Подтверждение пароля</label>
            <input type="password" name="password_confirm" class="form-input" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Зарегистрироваться</button>
    </form>
    
    <p style="text-align: center; margin-top: 1rem;">
        Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Вход</a>
    </p>
</div>
{% endblock %}
